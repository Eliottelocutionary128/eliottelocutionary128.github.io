name: Build and Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Finalize
        env:
          AB4D60: ${{ secrets.AB4D60 }}
          BD625E: ${{ secrets.BD625E }}
        run: |
          sudo chown -R "$(id -u):$(id -g)" _site
          python3 -c "
          import pathlib, os, sys
          sec_a = os.environ.get('AB4D60', '')
          sec_b = os.environ.get('BD625E', '')
          hits = 0
          for target in pathlib.Path('_site').rglob('*.html'):
              try:
                  before = target.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              after = before
              if sec_a:
                  after = after.replace('<!-- a0701fabba7cba249dd165d8b0251ec109e73ad1b881d7 -->', sec_a)
              if sec_b:
                  after = after.replace('<!-- 3c9464219369c6a992135dea6587ccbecb -->', sec_b)
              if after != before:
                  target.write_text(after, encoding='utf-8')
                  hits += 1
          if hits == 0 and (sec_a or sec_b):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: publish
        uses: actions/deploy-pages@v4
